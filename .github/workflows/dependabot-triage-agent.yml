name: Dependabot Triage Agent

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  security-events: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate triage files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRIAGE_ANALYZED_AT: ${{ github.run_started_at }}
        run: python scripts/dependabot_triage.py

      - name: Commit triage output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .triage-agent/dependabot
          if git diff --cached --quiet; then
            echo "No triage updates to commit"
            exit 0
          fi
          git commit -m "chore: update dependabot triage output"
          git push
